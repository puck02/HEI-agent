services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hel-agent
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./dev_logs:/app/dev_logs
    restart: unless-stopped
    networks:
      - hel-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: hel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helagent_password}
      POSTGRES_DB: ${POSTGRES_DB:-helagent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helagent}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hel-network

  redis:
    image: redis:7-alpine
    container_name: hel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - hel-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hel-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  hel-network:
    driver: bridge
